workflows:
  ios-build:
    name: iOS Simulator Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    scripts:
      - name: Check Xcode project
        script: |
          ls -la
          if [ ! -d "*.xcodeproj" ]; then
            echo "ERROR: No .xcodeproj found. Please add Xcode project to repository."
            exit 1
          fi
      - name: Build for iOS Simulator
        script: |
          xcodebuild build-project \
            -project SMSExpenseTracker.xcodeproj \
            -scheme SMSExpenseTracker \
            -configuration Debug \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            build
    artifacts:
      - build/Build/Products/*.app
